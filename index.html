<!DOCTYPE html>
<html>
<head>

<title>CRM Corretora</title>

<style>

body{
background:#0b0f1a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111827;
padding:40px;
border-radius:12px;
width:400px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
background:#1f2937;
border:none;
color:white;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Relatório de Atendimento</h2>

<select id="atendente">
<option>João</option>
<option>Maria</option>
<option>Carlos</option>
</select>

<input id="lead" placeholder="Nome do Lead">

<input id="telefone" placeholder="Telefone">

<input id="produto" placeholder="Produto">

<input id="etapa" placeholder="Etapa da conversa">

<input id="motivo" placeholder="Motivo da perda">

<input id="observacao" placeholder="Observação">

<select id="vendeu">
<option>Não</option>
<option>Sim</option>
</select>

<button onclick="enviar()">Enviar Relatório</button>

</div>

<script>

function enviar(){

const dados = {

atendente:document.getElementById("atendente").value,
lead:document.getElementById("lead").value,
telefone:document.getElementById("telefone").value,
produto:document.getElementById("produto").value,
etapa:document.getElementById("etapa").value,
motivo:document.getElementById("motivo").value,
observacao:document.getElementById("observacao").value,
vendeu:document.getElementById("vendeu").value

}

fetch("https://script.google.com/macros/s/AKfycbyXQl2-uxsir6jGANRehe57eYHnWsZVgv2m98FZR0QqnrzgFYc4_T2EwXZjJjfmYvmQTA/exec",{
method:"POST",
body:JSON.stringify(dados)
})
.then(res=>res.json())
.then(data=>{
alert("Relatório enviado com sucesso!")
})

}

</script>

</body>
</html>
