<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Relatório de Leads</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:20px;
padding:15px;
background:#0070f3;
color:white;
border:none;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<div class="box">

<h2>Relatório de Atendimento</h2>

<input id="consultor" placeholder="Consultor">

<input id="lead" placeholder="Nome do Lead">

<input id="telefone" placeholder="Telefone">

<select id="produto">
<option>Seguro Auto</option>
<option>Seguro Vida</option>
<option>Plano Saúde</option>
</select>

<select id="etapa">
<option>Não respondeu</option>
<option>Primeiro contato</option>
<option>Cotação enviada</option>
<option>Negociação</option>
<option>Fechado</option>
</select>

<select id="vendeu">
<option>Sim</option>
<option>Não</option>
</select>

<select id="motivo">
<option>Preço</option>
<option>Sem interesse</option>
<option>Já possui seguro</option>
<option>Não respondeu</option>
</select>

<textarea id="obs" placeholder="Observação"></textarea>

<button onclick="enviar()">Enviar</button>

</div>

<script>

function enviar(){

const data = {
consultor: document.getElementById("consultor").value,
lead: document.getElementById("lead").value,
telefone: document.getElementById("telefone").value,
produto: document.getElementById("produto").value,
etapa: document.getElementById("etapa").value,
motivo: document.getElementById("motivo").value,
obs: document.getElementById("obs").value,
vendeu: document.getElementById("vendeu").value
}

fetch("https://script.google.com/macros/s/AKfycbzdgrkUBA2jMp9rHrvZkxrRXEphv5eX9itrzSbw43lV_oYabEjfcQvVJa27jmxMGN5YWg/exec",{
method:"POST",
body:JSON.stringify(data)
})

alert("Relatório enviado!")

}

</script>

</body>
</html>
